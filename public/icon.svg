<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#0d1a3a"/>
      <stop offset="100%" stop-color="#050a18"/>
    </radialGradient>
    <radialGradient id="sun" cx="38%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="55%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9f1c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- background stars -->
  <circle cx="88" cy="92" r="3" fill="#dbe4ff" opacity="0.7"/>
  <circle cx="430" cy="70" r="2.4" fill="#dbe4ff" opacity="0.55"/>
  <circle cx="465" cy="180" r="2" fill="#dbe4ff" opacity="0.45"/>
  <circle cx="60" cy="300" r="2.2" fill="#dbe4ff" opacity="0.5"/>
  <circle cx="120" cy="440" r="2.8" fill="#dbe4ff" opacity="0.6"/>
  <circle cx="410" cy="430" r="2.2" fill="#dbe4ff" opacity="0.5"/>
  <circle cx="360" cy="120" r="1.8" fill="#dbe4ff" opacity="0.4"/>

  <!-- orbits -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#4dd8ff" stroke-opacity="0.38" stroke-width="5"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#4dd8ff" stroke-opacity="0.3" stroke-width="5"/>
  <circle cx="256" cy="256" r="205" fill="none" stroke="#4dd8ff" stroke-opacity="0.22" stroke-width="5"/>

  <!-- sun -->
  <circle cx="256" cy="256" r="118" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="62" fill="url(#sun)"/>

  <!-- planets on orbits -->
  <circle cx="256" cy="146" r="15" fill="#ffb84d"/>
  <circle cx="392" cy="341" r="19" fill="#4dd8ff"/>
  <circle cx="83" cy="330" r="13" fill="#9db4ff"/>
</svg>
