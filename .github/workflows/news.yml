name: Refresh news

on:
  schedule:
    - cron: '17 9 * * 1' # Mondays 09:17 UTC — weekly refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-news.mjs
      - id: commit
        run: |
          if git diff --quiet public/news.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/news.json
            git commit -m "chore: refresh news $(date -u +%FT%TZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # Pushes made with GITHUB_TOKEN don't trigger `on: push` workflows, so the
  # redeploy must be invoked explicitly.
  deploy:
    needs: fetch
    if: needs.fetch.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
